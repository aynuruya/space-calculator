<!DOCTYPE html>
<html>
<head>
  <title>Cosmic Calculator</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: black;
    }

    /* Starfield background */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .calculator {
      position: relative;
      z-index: 2;
      background: rgba(15, 15, 30, 0.9);
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      width: 320px;
      transition: 0.4s;
    }

    #display {
      width: 100%;
      height: 60px;
      background: black;
      border: none;
      border-radius: 12px;
      color: #00f7ff;
      font-size: 24px;
      text-align: right;
      padding: 10px;
      margin-bottom: 15px;
      box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.6);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      background: #1c1c2b;
      color: white;
      transition: 0.2s;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    button:hover {
      background: #00f7ff;
      color: black;
      transform: scale(1.1);
      box-shadow: 0 0 25px #00f7ff;
    }

    .equal {
      grid-column: span 2;
      background: #ff00c8;
    }

    .equal:hover {
      background: #ff66e0;
      box-shadow: 0 0 25px #ff66e0;
    }

    .mode-toggle {
      margin-top: 15px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      color: #aaa;
    }

    .pink-mode {
      box-shadow: 0 0 50px rgba(255, 0, 200, 0.6);
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="calculator" id="calc">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('*')">*</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('.')">.</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="calculate()" class="equal">=</button>

    <button onclick="append('0')" style="grid-column: span 4;">0</button>
  </div>

  <div class="mode-toggle" onclick="toggleMode()">
    ✨ Toggle Pink Nebula Mode ✨
  </div>
</div>

<audio id="clickSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-interface-click-1126.mp3" type="audio/mpeg">
</audio>

<script>
  function append(value) {
    document.getElementById("display").value += value;
    playSound();
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }

  function calculate() {
    try {
      document.getElementById("display").value =
        eval(document.getElementById("display").value);
      playSound();
    } catch {
      document.getElementById("display").value = "Error";
    }
  }

  function playSound() {
    document.getElementById("clickSound").play();
  }

  function toggleMode() {
    document.getElementById("calc").classList.toggle("pink-mode");
  }

  /* Star animation */
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = [];

  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5,
      speed: Math.random() * 0.5
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
      ctx.fill();
      star.y += star.speed;
      if (star.y > canvas.height) star.y = 0;
    });

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
