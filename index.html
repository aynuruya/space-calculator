<!DOCTYPE html>
<html>
<head>

<title>Noor's Cosmic Finance Console</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
  
background:black;
  
background-size:cover;
background-position:center;
background-attachment: fixed;
color:white;
}

/* ⭐ stars layer */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);

background-size:120px 120px, 200px 200px;
background-position:0 0, 60px 60px;

opacity:0.55;
animation:starsMove 200s linear infinite;

pointer-events:none;
}

/* 🌙 cosmic dark overlay */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.9));
z-index:-1;
pointer-events:none;
}
  
/* MAIN PANEL */

#spaceVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.45) contrast(1.2) saturate(1.3);
}
  
.container{

background:rgba(8,8,20,0.45);
backdrop-filter:blur(20px);

padding:30px;

border-radius:25px;

width:360px;

box-shadow:
0 0 30px rgba(0,255,255,0.3),
0 0 80px rgba(140,0,255,0.3);

animation:floatConsole 8s ease-in-out infinite, consoleGlow 6s ease-in-out infinite;
  
}

/* CLOCK */

.clock{

text-align:center;
font-size:20px;
letter-spacing:2px;

color:#00ffff;

margin-bottom:15px;

text-shadow:0 0 15px #00ffff;

}

/* MODE BUTTONS */

.mode-buttons{

text-align:center;
margin-bottom:15px;

}

.mode-buttons button{

padding:8px 14px;

margin:5px;

border-radius:12px;

border:1px solid rgba(255,255,255,0.1);

background:rgba(20,20,40,0.6);

color:#00ffff;

cursor:pointer;

transition:0.3s;

}

.mode-buttons button:hover{

box-shadow:
0 0 10px #00ffff,
0 0 25px #00ffff;

}

/* DISPLAY */

input{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:black;

color:#00ffff;

font-size:20px;

text-align:right;

margin-bottom:15px;

box-shadow:inset 0 0 10px #000;

}

/* BUTTON GRID */

.buttons{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:12px;

}

/* CALC BUTTON */

.calc-btn{

padding:14px;

border-radius:12px;

border:1px solid rgba(255,255,255,0.1);

background:rgba(25,25,50,0.7);

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 5px rgba(0,255,255,0.2),
inset 0 0 5px rgba(255,255,255,0.05);

}

/* NEON HOVER */

.calc-btn:hover{

color:#00ffff;

box-shadow:
0 0 10px #00ffff,
0 0 25px #00ffff,
0 0 40px #00ffff;

}

/* RESULT */

.result{

margin-top:10px;

text-align:center;

color:#ff7bff;

text-shadow:0 0 10px #ff7bff;

}

/* HIDDEN */

.hidden{

display:none;

}

@keyframes starsMove{

from{
transform:translateY(0px);
}

to{
transform:translateY(-2000px);
}

}

/* Cosmic particles */

.particle{
position:fixed;
width:3px;
height:3px;
background:#00ffff;
border-radius:50%;
opacity:0.6;
pointer-events:none;
animation:particleMove linear infinite;
}

@keyframes particleMove{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-10vh);
}

}

@keyframes floatConsole{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}

}

@keyframes consoleGlow{

0%{
box-shadow:
0 0 20px rgba(0,255,255,0.25),
0 0 60px rgba(140,0,255,0.25);
}

50%{
box-shadow:
0 0 35px rgba(0,255,255,0.55),
0 0 120px rgba(140,0,255,0.55);
}

100%{
box-shadow:
0 0 20px rgba(0,255,255,0.25),
0 0 60px rgba(140,0,255,0.25);
}

}
  
/* NEBULA GLOW */

.nebula{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle at 20% 30%, rgba(140,0,255,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,200,255,0.25), transparent 40%);

filter:blur(80px);
z-index:-3;

animation:nebulaMove 40s ease-in-out infinite alternate;
}

@keyframes nebulaMove{
from{
transform:scale(1) translateY(0px);
}
to{
transform:scale(1.2) translateY(-60px);
}
}

</style>

</head>

<body>

<div class="nebula"></div>
  
<video autoplay muted loop playsinline id="spaceVideo">
<source src="https://cdn.coverr.co/videos/coverr-galaxy-rotation-1571/1080p.mp4" type="video/mp4">
</video>

<div class="container">

<div class="clock" id="clock"></div>

<div class="mode-buttons">

<button onclick="showCalc()">Calculator</button>
<button onclick="showCompound()">Compound 💸</button>

</div>

<div id="calcMode">

<input id="display" disabled>

<div class="buttons">

<button class="calc-btn" onclick="clearDisplay()">C</button>
<button class="calc-btn" onclick="backspace()">⌫</button>
<button class="calc-btn" onclick="append('/')">÷</button>
<button class="calc-btn" onclick="append('*')">×</button>

<button class="calc-btn" onclick="append('7')">7</button>
<button class="calc-btn" onclick="append('8')">8</button>
<button class="calc-btn" onclick="append('9')">9</button>
<button class="calc-btn" onclick="append('-')">−</button>

<button class="calc-btn" onclick="append('4')">4</button>
<button class="calc-btn" onclick="append('5')">5</button>
<button class="calc-btn" onclick="append('6')">6</button>
<button class="calc-btn" onclick="append('+')">+</button>

<button class="calc-btn" onclick="append('1')">1</button>
<button class="calc-btn" onclick="append('2')">2</button>
<button class="calc-btn" onclick="append('3')">3</button>
<button class="calc-btn" onclick="calculate()">=</button>

<button class="calc-btn" onclick="append('0')" style="grid-column:span 2;">0</button>
<button class="calc-btn" onclick="append('.')">.</button>

</div>

</div>

<div id="compoundMode" class="hidden">

<input id="principal" type="number" placeholder="Principal ₹">

<input id="rate" type="number" placeholder="Annual Rate %">

<input id="years" type="number" placeholder="Years">

<button class="calc-btn" onclick="calculateCompound()">Calculate Growth</button>

<div class="result" id="compoundResult"></div>

</div>

</div>

<script>

/* CALCULATOR */

function append(val){
document.getElementById("display").value+=val
}

function calculate(){
try{
document.getElementById("display").value=
eval(document.getElementById("display").value)
}
catch{
document.getElementById("display").value="Error"
}
}

function clearDisplay(){
document.getElementById("display").value=""
}

function backspace(){
let current=document.getElementById("display").value
document.getElementById("display").value=current.slice(0,-1)
}

/* MODES */

function showCalc(){
document.getElementById("calcMode").classList.remove("hidden")
document.getElementById("compoundMode").classList.add("hidden")
}

function showCompound(){
document.getElementById("calcMode").classList.add("hidden")
document.getElementById("compoundMode").classList.remove("hidden")
}

/* COMPOUND */

function calculateCompound(){

let p=parseFloat(document.getElementById("principal").value)

let r=parseFloat(document.getElementById("rate").value)/100

let t=parseFloat(document.getElementById("years").value)

let amount=p*Math.pow((1+r),t)

let result=document.getElementById("compoundResult")

result.innerHTML="Future Value: ₹ "+amount.toFixed(2)

result.style.transform="scale(1.2)"
result.style.transition="0.4s"

setTimeout(()=>{
result.style.transform="scale(1)"
},400)

}

/* CLOCK */

function updateClock(){

let now=new Date()

document.getElementById("clock").innerHTML=
now.toLocaleTimeString()

}

setInterval(updateClock,1000)

updateClock()

/* create floating particles */

for(let i=0;i<40;i++){

let p=document.createElement("div")

p.className="particle"

p.style.left=Math.random()*100+"vw"

p.style.animationDuration=(5+Math.random()*15)+"s"

document.body.appendChild(p)

}

</script>

</body>
</html>
